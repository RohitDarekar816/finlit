services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: finlit-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: finlit
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./backend/init.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - finlit-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finlit-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/finlit?authSource=admin
      CORS_ORIGIN: http://localhost:3000
    expose:
      - "5000"
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - backend_finlit:/app/uploads
    networks:
      - finlit-network
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:5000', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: finlit-frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env.example
    environment:
      VITE_BACKEND_URL: http://localhost:5000
      VITE_APP_ENV: production
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - finlit-network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost/",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  mongodb_data:
    driver: local

networks:
  finlit-network:
    driver: bridge

