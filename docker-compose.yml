services:
  # Backend API
  backend:
    image: rohitdarekar816/finlit:latest
    container_name: finlit-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://root:kbvyznK0x5jH35fQrv6pK9JjoVj3a0jQkN6jgldT1dXf916ASKKqTz2kek9lkWP8@t4o80cs8kwgok0w408sos08k:27017/?directConnection=true
      CORS_ORIGIN: https://taxai.afintrix.com
    expose:
      - "5000"
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - backend_finlit:/app/uploads
    networks:
      - t4o80cs8kwgok0w408sos08k
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:5000', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend Application
  frontend:
    image: rohitdarekar816/finlit-frontend:latest
    container_name: finlit-frontend
    restart: unless-stopped
    environment:
      VITE_BACKEND_URL: http://backend:5000
      VITE_APP_ENV: production
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - t4o80cs8kwgok0w408sos08k
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost/",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  t4o80cs8kwgok0w408sos08k:
    external: true
