services:
  #mongo
  mongodb:
    image: mongo:7.0
    container_name: finlit-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE}
    expose:
      - "27017"
    volumes:
      - mongodb_data:/data/db
      - ./backend/init.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - proxy
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
  # Backend API
  backend:
    build:
      context: ./backend
    container_name: finlit-backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${PORT}
      MONGODB_URI: ${MONGODB_URI}
      CORS_ORIGIN: ${CORS_ORIGIN}
    expose:
      - "5000"
    volumes:
      - backend_finlit:/app/uploads
    networks:
      - proxy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:5000', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend Application
  frontend:
    build:
      context: ./frontend
    container_name: finlit-frontend
    restart: unless-stopped
    environment:
      VITE_BACKEND_URL: ${VITE_BACKEND_URL}
      VITE_APP_ENV: ${VITE_APP_ENV}
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  mongodb_data:
    driver: local
  backend_finlit:
    driver: local

networks:
  proxy:
    external: true
